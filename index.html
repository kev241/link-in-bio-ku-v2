    <script>
        let categories = ["All"];
        let activeCategory = "All";
        let searchQuery = "";

        const categoryContainer = document.getElementById("categoryContainer");
        const productsGrid = document.getElementById("productsGrid");
        const searchInput = document.getElementById("searchInput");
        const noResults = document.getElementById("noResults");

        function renderCategories() {
            if (typeof products !== 'undefined' && products.length > 0) {
                const uniqueCats = new Set(products.map(p => p.category));
                categories = ["All", ...uniqueCats];
            }

            categoryContainer.innerHTML = "";
            categories.forEach(cat => {
                const btn = document.createElement("button");
                btn.className = `category-btn ${cat === activeCategory ? "active" : ""}`;
                btn.textContent = cat;
                btn.onclick = () => {
                    activeCategory = cat;
                    renderCategories();
                    renderProducts();
                };
                categoryContainer.appendChild(btn);
            });
        }

        function renderProducts(dataArray) {
            const dataToRender = dataArray || (typeof products !== 'undefined' ? products : []);
            const existingCards = productsGrid.querySelectorAll('.product-card');
            existingCards.forEach(card => card.remove());

            const filteredProducts = dataToRender.filter(product => {
                const matchCategory = activeCategory === "All" || product.category === activeCategory;
                const searchLower = searchQuery.toLowerCase();
                const matchSearch = product.title.toLowerCase().includes(searchLower) ||
                    product.id.toString().includes(searchLower);
                return matchCategory && matchSearch;
            });

            if (filteredProducts.length === 0) {
                noResults.style.display = "block";
            } else {
                noResults.style.display = "none";
                filteredProducts.forEach(product => {
                    const card = document.createElement("div");
                    card.className = "product-card";
                    card.innerHTML = `
                    <div class="product-badge">#${product.id}</div>
                    <img src="${product.img}" alt="${product.title}" class="product-image" loading="lazy">
                    <div class="product-info">
                        <div class="product-title">${product.title}</div>
                        <a href="${product.link}" target="_blank" rel="noopener noreferrer" class="checkout-btn">Checkout 🛒</a>
                    </div>
                `;
                    productsGrid.insertBefore(card, noResults);
                });
            }
        }

        searchInput.addEventListener("input", (e) => {
            searchQuery = e.
